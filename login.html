<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | MuslimForever</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="supabase.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',sans-serif; }
    body { background: linear-gradient(135deg, #0a2e1a 0%, #1a5c3a 50%, #0d4028 100%); min-height:100vh; display:flex; align-items:center; justify-content:center; margin:0; padding:20px; }
    .login-wrapper { max-width:420px; width:100%; }
    .login-card { background:white; border-radius:24px; padding:2.5rem; box-shadow:0 20px 60px rgba(0,0,0,0.4); }
    body.dark .login-card { background:#1a2533; }
    .login-card .logo { text-align:center; font-size:1.6rem; font-weight:800; color:#1a5c3a; }
    body.dark .login-card .logo { color:#c8a96e; }
    .login-card .logo .star { color:#c8a96e; }
    .login-card .subtitle { text-align:center; color:#888; font-size:0.95rem; margin-bottom:1.5rem; }
    body.dark .login-card .subtitle { color:#aaa; }
    .dua-divider { text-align:center; color:#c8a96e; font-size:1.5rem; margin:0.5rem 0 1.5rem 0; font-family:'Amiri','Times New Roman',serif; }
    .form-group { margin-bottom:1.2rem; }
    .form-group label { display:block; font-weight:600; font-size:0.85rem; color:#555; margin-bottom:5px; }
    body.dark .form-group label { color:#aaa; }
    .form-group input { width:100%; padding:12px 16px; border:2px solid #e0e0e0; border-radius:12px; font-size:0.95rem; transition:0.2s; background:white; color:#333; box-sizing:border-box; }
    body.dark .form-group input { background:#2a3545; border-color:#3d4a5a; color:white; }
    .form-group input:focus { outline:none; border-color:#1a5c3a; box-shadow:0 0 0 3px rgba(26,92,58,0.1); }
    body.dark .form-group input:focus { border-color:#c8a96e; box-shadow:0 0 0 3px rgba(200,169,110,0.1); }
    .btn-login { width:100%; padding:14px; background:#1a5c3a; color:white; border:none; border-radius:12px; font-size:1.05rem; font-weight:700; cursor:pointer; transition:0.3s; margin-top:0.5rem; }
    body.dark .btn-login { background:#c8a96e; color:#1a1a2e; }
    .btn-login:hover { transform:scale(1.02); box-shadow:0 8px 25px rgba(26,92,58,0.3); }
    body.dark .btn-login:hover { box-shadow:0 8px 25px rgba(200,169,110,0.3); }
    .btn-login:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
    .register-link { text-align:center; margin-top:1.5rem; color:#888; font-size:0.95rem; }
    body.dark .register-link { color:#aaa; }
    .register-link a { color:#1a5c3a; text-decoration:none; font-weight:600; }
    body.dark .register-link a { color:#c8a96e; }
    .register-link a:hover { text-decoration:underline; }
    .error-message { background:#fee2e2; color:#dc2626; padding:10px 14px; border-radius:10px; font-size:0.85rem; margin-bottom:1rem; display:none; }
    body.dark .error-message { background:#2d1a1a; color:#f87171; }
    .back-home { text-align:center; margin-top:1rem; font-size:0.85rem; }
    .back-home a { color:#888; text-decoration:none; }
    body.dark .back-home a { color:#666; }
    .back-home a:hover { color:#1a5c3a; }
    body.dark .back-home a:hover { color:#c8a96e; }
    @media (max-width:480px) { .login-card { padding:1.5rem; } .login-card .logo { font-size:1.3rem; } }
  </style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-card">
    <div class="logo"><span class="star">☪</span> MuslimForever</div>
    <p class="subtitle">Welcome back! Login to continue your journey</p>
    <div class="dua-divider">ﷺ</div>
    <div id="errorMessage" class="error-message"></div>
    <form id="loginForm">
      <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="Enter your email" required></div>
      <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Enter your password" required></div>
      <button type="submit" class="btn-login" id="loginBtn">🔑 Login</button>
    </form>
    <div class="register-link">Don't have an account? <a href="signup.html">Register Free</a></div>
    <div class="back-home"><a href="index.html">← Back to Home</a></div>
    <div class="dua-divider" style="margin-top:1rem;font-size:1.2rem;">ﷺ</div>
  </div>
</div>
<script>
  document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');
    errorDiv.style.display = 'none';
    errorDiv.textContent = '';
    if (!email || !password) { errorDiv.textContent = 'Please fill in all fields'; errorDiv.style.display = 'block'; return; }
    loginBtn.textContent = '⏳ Logging in...';
    loginBtn.disabled = true;
    try {
      const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
      if (error) { errorDiv.textContent = '❌ ' + error.message; errorDiv.style.display = 'block'; loginBtn.textContent = '🔑 Login'; loginBtn.disabled = false; return; }
      if (data.user) {
        const { data: profile } = await supabaseClient.from('profiles').select('id, approved, is_verified').eq('user_id', data.user.id).maybeSingle();
        if (profile && !profile.approved) {
          errorDiv.textContent = '⏳ Your profile is pending admin approval.'; errorDiv.style.display = 'block'; loginBtn.textContent = '🔑 Login'; loginBtn.disabled = false; return;
        }
        window.location.href = 'index.html';
      }
    } catch (err) {
      errorDiv.textContent = '❌ An error occurred. Please try again.'; errorDiv.style.display = 'block'; loginBtn.textContent = '🔑 Login'; loginBtn.disabled = false;
    }
  });
  document.getElementById('password')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') { document.getElementById('loginForm').dispatchEvent(new Event('submit')); } });
</script>
</body>
</html>
